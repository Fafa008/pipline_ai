name: CI/CD - Build and Push to HF Space

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Hugging Face
        run: |
          echo "${{ secrets.HF_TOKEN }}" | docker login -u "${{ secrets.HF_USERNAME }}" --password-stdin hf.co

      - name: Build Docker image
        run: docker build -t hf.co/spaces/${{ secrets.HF_USERNAME }}/fruit-clustering-api:latest .

      - name: Push to HF Space
        run: docker push hf.co/spaces/${{ secrets.HF_USERNAME }}/fruit-clustering-api:latest
